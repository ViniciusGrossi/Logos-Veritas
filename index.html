<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Consulta CPF — Logos Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{--accent:#F97316;--accent-glow:rgba(249,115,22,.15);--bg:#030303;--card-bg:#0a0a0a;--border:rgba(255,255,255,.08);--text-primary:#e6e1d7;--text-secondary:#737373;--text-muted:#404040}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 50% -20%,#1a100a 0%,#030303 100%);color:var(--text-primary);min-height:100vh;padding:60px 20px;overflow-x:hidden}
.container{max-width:960px;margin:0 auto;position:relative}
.header{display:flex;align-items:center;gap:14px;margin-bottom:56px;opacity:0;animation:fadeInDown .8s ease forwards}
.dot-outer{width:14px;height:14px;border-radius:50%;background:var(--accent-glow);display:flex;align-items:center;justify-content:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
.label{font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:var(--text-secondary);font-weight:500}
.upload-zone{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:64px 32px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px var(--accent-glow)}
.upload-icon{font-size:32px;color:var(--accent);margin-bottom:20px;filter:drop-shadow(0 0 8px var(--accent-glow))}
.upload-title{font-size:20px;font-weight:500;color:var(--text-primary);margin-bottom:8px;letter-spacing:-.01em}
.upload-sub{font-size:14px;color:var(--text-secondary);margin-bottom:28px}
.upload-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:10px;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s cubic-bezier(.4,0,.2,1);font-family:inherit}
.btn-primary{background:var(--accent);color:#000;box-shadow:0 4px 12px rgba(249, 115, 22, 0.2); }
.progress-container{margin-top:40px;opacity:0;animation:fadeInUp .6s ease forwards}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.progress-title{font-size:15px;font-weight:500;color:var(--text-primary)}
.badge{font-size:10px;padding:4px 12px;border-radius:100px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.badge-running{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.15)}
.badge-done{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.15)}
.progress-track{height:4px;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:32px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);box-shadow:0 0 12px var(--accent-glow);border-radius:10px;transition:width .3s ease;width:0%}
.table-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.table-head{display:grid;grid-template-columns:130px 1fr 110px 110px 72px;padding:12px 20px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);font-weight:600}
.table-viewport{overflow:hidden;position:relative;min-height:400px}
.table-row{display:grid;grid-template-columns:130px 1fr 110px 110px 72px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;transition:background .2s}
.td-cpf{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-secondary)}
.td-nome{font-size:14px;font-weight:400;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:16px}
.td-sit{font-size:13px;font-weight:500}
.sit-regular{color:#4ade80}
.sit-erro{color:#f87171}
.status-pill{font-size:10px;padding:3px 10px;border-radius:100px;font-weight:600;text-transform:uppercase;text-align:center}
.pill-wait{background:var(--border);color:var(--text-secondary)}
.pill-run{background:rgba(251,191,36,.1);color:#FBBF24;animation:blink 1.5s infinite}
.pill-ok{background:rgba(34,197,94,.1);color:#4ade80}
.pill-err{background:rgba(248,113,113,.1);color:#f87171}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
.pag-info{font-size:12px;color:var(--text-secondary)}
.pag-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center}
.pag-btn:disabled{opacity:.2;cursor:not-allowed}
.download-btn{width:100%;padding:16px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px;box-shadow:0 4px 20px rgba(249,115,22,.2);transition:all .3s}
.hidden{display:none!important}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="dot-outer"><div class="dot"></div></div>
    <span class="label">Logos Tech — Consulta CPF em Lote (Vercel Edition)</span>
  </div>

  <div id="section-upload" class="section">
    <div class="upload-zone" id="drop-zone">
      <input type="file" accept=".xlsx" class="upload-input" id="file-input"/>
      <div class="upload-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <p class="upload-title">Importar base de CPFs</p>
      <p class="upload-sub">Apenas coluna <strong>cpf</strong> necessária</p>
      <button class="btn btn-primary">Selecionar Arquivo</button>
    </div>
  </div>

  <div id="section-processing" class="section hidden">
    <div class="progress-container">
      <div class="progress-header">
        <span class="progress-title">Processando <span id="done-count">0</span> de <span id="total-count">0</span></span>
        <span class="badge badge-running" id="status-badge">Consultando...</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="table-wrap">
        <div class="table-head">
          <span class="th">CPF</span><span class="th">Nome</span><span class="th">Nasc.</span><span class="th">Situação</span><span class="th">Status</span>
        </div>
        <div class="table-body" id="table-body"></div>
      </div>
      <div class="pagination">
        <span class="pag-info">Página <span id="pag-current">1</span> de <span id="pag-total">1</span></span>
        <div style="display:flex;gap:8px">
          <button class="pag-btn" id="pag-prev" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="pag-btn" id="pag-next" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <button class="download-btn hidden" id="download-btn">Exportar Resultados (.xlsx)</button>
    </div>
  </div>
</div>

<script>
let allData = [];
let currentPage = 1;
const PAGE_SIZE = 20;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.xlsx')) {
    handleFile(file);
  } else {
    alert("Por favor, importe um arquivo Excel (.xlsx) válido.");
  }
});

async function handleFile(file) {
  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);
  
  const colCpf = Object.keys(json[0] || {}).find(k => k.toLowerCase().trim() === 'cpf');
  if(!colCpf) { alert("Coluna 'cpf' não encontrada!"); return; }

  allData = json.map(row => ({
    cpf_raw: String(row[colCpf]).replace(/\D/g,''),
    nome: '', nascimento: '', situacao: '', status: 'wait', erro: ''
  })).filter(r => r.cpf_raw.length === 11);

  if(allData.length === 0) { alert("Nenhum CPF válido encontrado!"); return; }

  document.getElementById('total-count').textContent = allData.length;
  document.getElementById('section-upload').classList.add('hidden');
  document.getElementById('section-processing').classList.remove('hidden');
  
  render();
  startProcessing();
}

async function startProcessing() {
  const badge = document.getElementById('status-badge');
  for(let i=0; i < allData.length; i++) {
    allData[i].status = 'run';
    render();
    
    try {
      const res = await fetch(`/api/consultar?cpf=${allData[i].cpf_raw}`);
      const result = await res.json();
      
      allData[i].nome = result.nome || '—';
      allData[i].nascimento = result.data_nascimento || '—';
      allData[i].situacao = result.situacao || '—';
      allData[i].status = result.erro ? 'err' : 'ok';
      allData[i].erro = result.erro || '';
      allData[i].comprovante = result.comprovante;
      allData[i].comprovante_data = result.comprovante_data;
      allData[i].data_inscricao = result.data_inscricao;
    } catch(e) {
      allData[i].status = 'err';
      allData[i].erro = 'Erro de conexão';
    }

    document.getElementById('done-count').textContent = i + 1;
    document.getElementById('progress-fill').style.width = ((i+1)/allData.length*100) + '%';
    
    // Pequeno delay para evitar bloqueio da API
    await new Promise(r => setTimeout(r, 1000));
    render();
  }
  
  badge.textContent = 'Concluído';
  badge.className = 'badge badge-done';
  document.getElementById('download-btn').classList.remove('hidden');
}

function render() {
  const body = document.getElementById('table-body');
  const start = (currentPage-1)*PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageItems = allData.slice(start, end);
  
  body.innerHTML = pageItems.map(r => `
    <div class="table-row">
      <span class="td-cpf">${r.cpf_raw}</span>
      <span class="td-nome">${r.nome || '...'}</span>
      <span class="td-nasc">${r.nascimento || '...'}</span>
      <span class="td-sit ${r.status==='err'?'sit-erro':'sit-regular'}">${r.situacao || '—'}</span>
      <span class="status-pill pill-${r.status}">${r.status==='ok'?'✓ OK':(r.status==='run'?'...':(r.status==='err'?'Erro':'Wait'))}</span>
    </div>
  `).join('');

  const totalPages = Math.ceil(allData.length / PAGE_SIZE);
  document.getElementById('pag-current').textContent = currentPage;
  document.getElementById('pag-total').textContent = totalPages;
  document.getElementById('pag-prev').disabled = currentPage <= 1;
  document.getElementById('pag-next').disabled = currentPage >= totalPages;
}

document.getElementById('pag-prev').onclick = () => { currentPage--; render(); };
document.getElementById('pag-next').onclick = () => { currentPage++; render(); };

document.getElementById('download-btn').onclick = () => {
  const ws = XLSX.utils.json_to_sheet(allData.map(r => ({
    'CPF': r.cpf_raw,
    'Nome': r.nome,
    'Data Nascimento': r.nascimento,
    'Situação': r.situacao,
    'Data Inscrição': r.data_inscricao,
    'Comprovante': r.comprovante,
    'Data Comprovante': r.comprovante_data,
    'Erro': r.erro
  })));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Resultados");
  XLSX.writeFile(wb, "resultado_consulta_cpf.xlsx");
};
</script>
</body>
</html>
